<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UOB TMRW — Server Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #7d8590;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --blue: #58a6ff; --purple: #bc8cff;
    --sas: #f59e0b; --android: #10b981; --cvm: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }

  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .badge { background: var(--green); color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .actions { margin-left: auto; display: flex; gap: 8px; }
  .btn { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
  .btn:hover { border-color: var(--blue); color: var(--text); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn.success { border-color: var(--green); color: var(--green); }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); height: calc(100vh - 49px); }
  .panel { background: var(--bg2); display: flex; flex-direction: column; overflow: hidden; }
  .panel.full { grid-column: 1 / -1; max-height: 280px; }
  .panel.slim { grid-column: 1 / -1; max-height: 200px; }

  .panel-header {
    background: var(--bg3); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .count { background: var(--bg); color: var(--muted); padding: 1px 6px; border-radius: 10px; font-size: 10px; }
  .panel-actions { margin-left: auto; display: flex; gap: 6px; }

  .log-body { flex: 1; overflow-y: auto; padding: 4px 0; }
  .log-body::-webkit-scrollbar { width: 4px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nginx-row { display: grid; grid-template-columns: 72px 44px 56px 1fr 36px; gap: 6px; padding: 3px 14px; border-bottom: 1px solid rgba(48,54,61,0.4); align-items: center; }
  .nginx-row:hover { background: var(--bg3); }
  .ip-tag { padding: 1px 5px; border-radius: 10px; font-size: 9px; font-weight: 700; text-align: center; }
  .method { font-weight: 700; font-size: 11px; }
  .method.POST { color: var(--yellow); }
  .method.GET  { color: var(--green); }
  .path { color: var(--blue); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
  .status { text-align: center; padding: 1px 4px; border-radius: 4px; font-weight: 700; font-size: 10px; }
  .s200 { background: rgba(63,185,80,0.15); color: var(--green); }
  .s404 { background: rgba(248,81,73,0.15); color: var(--red); }
  .s304 { background: rgba(88,166,255,0.15); color: var(--blue); }
  .s500 { background: rgba(248,81,73,0.3); color: var(--red); }
  .time-s { color: var(--muted); font-size: 10px; }

  .log-line { padding: 2px 14px; line-height: 1.6; border-bottom: 1px solid rgba(48,54,61,0.2); white-space: pre-wrap; word-break: break-all; font-size: 11px; }
  .log-line:hover { background: var(--bg3); }
  .l-err { color: var(--red); }
  .l-ok  { color: var(--green); }
  .l-inf { color: var(--blue); }
  .l-wrn { color: var(--yellow); }

  .legend { display: flex; gap: 12px; padding: 5px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }

  .live { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--green); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .empty { text-align: center; padding: 30px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="live"><div class="live-dot"></div>LIVE</div>
  <h1>UOB TMRW — Server Dashboard</h1>
  <span class="badge">POC</span>
  <div class="actions">
    <button class="btn danger" onclick="clearAll()">Clear All</button>
    <button class="btn" id="copyBtn" onclick="copyAll()">📋 Copy All Logs</button>
    <button class="btn" onclick="loadAll()">Refresh</button>
  </div>
</div>

<div class="layout">
  <div class="panel full">
    <div class="panel-header">
      <span class="panel-title">🌐 Nginx</span>
      <span class="count" id="n-count">0</span>
      <div class="panel-actions">
        <button class="btn danger" onclick="clearNginx()">Clear</button>
      </div>
    </div>
    <div class="log-body" id="nginx-panel"><div class="empty">Loading...</div></div>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#f59e0b"></div>Tencent SAS</div>
      <div class="leg"><div class="dot" style="background:#10b981"></div>Android/Browser</div>
      <div class="leg"><div class="dot" style="background:#6366f1"></div>CVM Internal</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">⚡ Superapp Backend</span>
      <span class="count" id="sa-count">0</span>
      <div class="panel-actions"><button class="btn danger" onclick="flushLog('superapp')">Flush</button></div>
    </div>
    <div class="log-body" id="sa-panel"><div class="empty">Loading...</div></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">☕ Coffee Backend</span>
      <span class="count" id="cf-count">0</span>
      <div class="panel-actions"><button class="btn danger" onclick="flushLog('coffee')">Flush</button></div>
    </div>
    <div class="log-body" id="cf-panel"><div class="empty">Loading...</div></div>
  </div>

  <div class="panel slim">
    <div class="panel-header">
      <span class="panel-title">🛒 Ecommerce Backend</span>
      <span class="count" id="ec-count">0</span>
      <div class="panel-actions"><button class="btn danger" onclick="flushLog('miniapp')">Flush</button></div>
    </div>
    <div class="log-body" id="ec-panel"><div class="empty">Loading...</div></div>
  </div>
</div>

<script src="/superapp/serverDashboard/client.js"></script>
</body>
</html>
